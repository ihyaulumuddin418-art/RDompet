<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dompet — Keuangan Pribadi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #252525;
    --border2: #333;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --white: #ffffff;
    --accent: #ffffff;
    --green: #a8f0c6;
    --red: #f0a8a8;
    --gold: #f0dda8;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* NOISE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 120px;
  }

  /* HEADER */
  header {
    padding: 48px 0 32px;
    animation: fadeDown 0.6s ease both;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--white);
  }

  .logo span {
    color: var(--text2);
    font-style: italic;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    text-align: right;
    line-height: 1.6;
    margin-top: 4px;
  }

  /* BALANCE CARD */
  .balance-card {
    background: var(--white);
    color: #0a0a0a;
    border-radius: 24px;
    padding: 32px;
    margin: 8px 0 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .balance-card::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(0,0,0,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }

  .balance-label {
    font-size: 12px;
    font-weight: 500;
    color: #888;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .balance-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    letter-spacing: -2px;
    color: #0a0a0a;
    line-height: 1;
    margin-bottom: 24px;
  }

  .balance-amount .currency {
    font-size: 20px;
    letter-spacing: 0;
    vertical-align: super;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 500;
    margin-right: 4px;
  }

  .balance-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-size: 11px;
    color: #999;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: #111;
  }

  .stat-value.income { color: #1a7a45; }
  .stat-value.expense { color: #7a1a1a; }

  /* SAVINGS CARD */
  .savings-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .savings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .savings-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .savings-title .icon {
    width: 28px;
    height: 28px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .savings-total {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    font-weight: 500;
  }

  .savings-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .saving-item {
    background: var(--bg3);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeIn 0.3s ease both;
  }

  .saving-item-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .saving-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .saving-delete {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
  }

  .saving-delete:hover { color: var(--red); }

  .saving-amounts {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .saving-current {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gold);
  }

  .saving-target {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .saving-pct {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-align: right;
  }

  /* ADD SAVING */
  .add-saving-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .add-saving-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .tab {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--white);
    color: #0a0a0a;
    font-weight: 600;
  }

  /* FORM */
  .form-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  .form-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  input, select, textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--border2);
  }

  select { cursor: pointer; }

  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }

  .type-btn {
    padding: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .type-btn.active-income {
    background: rgba(168, 240, 198, 0.12);
    border-color: var(--green);
    color: var(--green);
  }

  .type-btn.active-expense {
    background: rgba(240, 168, 168, 0.12);
    border-color: var(--red);
    color: var(--red);
  }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--white);
    color: #0a0a0a;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }

  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); opacity: 1; }

  .btn-secondary {
    width: 100%;
    padding: 11px;
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary:hover { border-color: var(--border2); color: var(--text); }

  /* TRANSACTIONS */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 99px;
  }

  .tx-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.6s 0.45s ease both;
  }

  .tx-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeIn 0.3s ease both;
  }

  .tx-item:hover { border-color: var(--border2); transform: translateX(2px); }

  .tx-dot {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .tx-dot.income { background: rgba(168, 240, 198, 0.12); }
  .tx-dot.expense { background: rgba(240, 168, 168, 0.12); }

  .tx-info { flex: 1; min-width: 0; }

  .tx-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tx-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    display: flex;
    gap: 6px;
  }

  .tx-cat {
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 4px;
  }

  .tx-amount {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }

  .tx-delete {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 14px;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
    opacity: 0;
    flex-shrink: 0;
  }

  .tx-item:hover .tx-delete { opacity: 1; }
  .tx-delete:hover { color: var(--red); }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text3);
  }

  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

  .empty-text { font-size: 14px; line-height: 1.6; }

  /* FILTER */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
    scrollbar-width: none;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    padding: 6px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .filter-chip.active {
    background: var(--white);
    color: #0a0a0a;
    border-color: var(--white);
  }

  /* CHART */
  .chart-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 80px;
    margin-top: 16px;
  }

  .chart-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    height: 100%;
    justify-content: flex-end;
  }

  .chart-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.5s cubic-bezier(0.4,0,0.2,1);
    min-height: 2px;
  }

  .chart-bar.income { background: var(--green); opacity: 0.8; }
  .chart-bar.expense { background: var(--red); opacity: 0.8; }

  .chart-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text3);
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text2);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--white);
    color: #0a0a0a;
    padding: 12px 20px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 12px 16px 24px;
    gap: 4px;
    z-index: 10;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    color: var(--text3);
  }

  .nav-btn.active { color: var(--white); }

  .nav-btn .nav-icon { font-size: 20px; }

  .nav-btn .nav-label {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* TOPUP SAVING */
  .saving-topup-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: rgba(240, 221, 168, 0.12);
    border: 1px solid rgba(240, 221, 168, 0.3);
    color: var(--gold);
    padding: 3px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .saving-topup-btn:hover { background: rgba(240, 221, 168, 0.2); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1) both;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--white);
    margin-bottom: 20px;
  }

  .modal-close {
    float: right;
    background: var(--bg3);
    border: none;
    color: var(--text2);
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="logo">Dompet<span>.</span></div>
      <div class="date-badge" id="dateDisplay"></div>
    </div>
  </header>

  <!-- PAGE: BERANDA -->
  <div class="page active" id="page-home">
    <div class="balance-card">
      <div class="balance-label">Saldo Saat Ini</div>
      <div class="balance-amount" id="balanceDisplay">
        <span class="currency">Rp</span><span id="balanceNum">0</span>
      </div>
      <div class="balance-stats">
        <div class="stat">
          <div class="stat-label">Pemasukan</div>
          <div class="stat-value income" id="totalIncome">Rp 0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Pengeluaran</div>
          <div class="stat-value expense" id="totalExpense">Rp 0</div>
        </div>
      </div>
    </div>

    <!-- SAVINGS SUMMARY -->
    <div class="savings-card">
      <div class="savings-header">
        <div class="savings-title">
          <div class="icon">🏦</div>
          Tabungan
        </div>
        <div class="savings-total" id="savingsTotal">Rp 0</div>
      </div>
      <div class="savings-list" id="savingsList">
        <div class="empty-state" style="padding: 20px 0">
          <div class="empty-icon">🫙</div>
          <div class="empty-text" style="font-size:12px">Belum ada tabungan</div>
        </div>
      </div>
      <div class="add-saving-form">
        <div class="add-saving-row">
          <div>
            <label>Nama Tabungan</label>
            <input type="text" id="savingName" placeholder="Liburan, HP baru...">
          </div>
          <div>
            <label>Target (Rp)</label>
            <input type="number" id="savingTarget" placeholder="5000000">
          </div>
        </div>
        <button class="btn-secondary" onclick="addSaving()">+ Tambah Tabungan</button>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart-card">
      <div class="section-title">Minggu Ini</div>
      <div class="chart-bars" id="weekChart"></div>
      <div class="chart-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--green)"></div>
          Pemasukan
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--red)"></div>
          Pengeluaran
        </div>
      </div>
    </div>

    <!-- RECENT TX -->
    <div class="section-header">
      <div class="section-title">Transaksi Terbaru</div>
      <div class="count-badge" id="txCount">0</div>
    </div>
    <div class="tx-list" id="recentList"></div>
  </div>

  <!-- PAGE: CATAT -->
  <div class="page" id="page-add">
    <div class="form-card">
      <div class="form-title">Transaksi Baru</div>
      <div class="type-toggle">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">↑ Pemasukan</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">↓ Pengeluaran</button>
      </div>
      <div class="form-group">
        <label>Nominal (Rp)</label>
        <input type="number" id="txAmount" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Keterangan</label>
        <input type="text" id="txNote" placeholder="Gaji, makan siang, token listrik...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Kategori</label>
          <select id="txCategory">
            <option value="Umum">Umum</option>
            <option value="Makan & Minum">Makan & Minum</option>
            <option value="Transport">Transport</option>
            <option value="Belanja">Belanja</option>
            <option value="Tagihan">Tagihan</option>
            <option value="Hiburan">Hiburan</option>
            <option value="Kesehatan">Kesehatan</option>
            <option value="Pendidikan">Pendidikan</option>
            <option value="Gaji">Gaji</option>
            <option value="Bisnis">Bisnis</option>
            <option value="Hadiah">Hadiah</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" id="txDate">
        </div>
      </div>
      <button class="btn-primary" onclick="addTransaction()">Simpan Transaksi</button>
    </div>
  </div>

  <!-- PAGE: RIWAYAT -->
  <div class="page" id="page-history">
    <div class="filter-bar">
      <button class="filter-chip active" onclick="filterTx('all', this)">Semua</button>
      <button class="filter-chip" onclick="filterTx('income', this)">Pemasukan</button>
      <button class="filter-chip" onclick="filterTx('expense', this)">Pengeluaran</button>
      <button class="filter-chip" onclick="filterTx('Makan & Minum', this)">Makan</button>
      <button class="filter-chip" onclick="filterTx('Transport', this)">Transport</button>
      <button class="filter-chip" onclick="filterTx('Belanja', this)">Belanja</button>
    </div>
    <div class="section-header">
      <div class="section-title">Semua Transaksi</div>
      <div class="count-badge" id="historyCount">0</div>
    </div>
    <div class="tx-list" id="historyList"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')">
    <span class="nav-icon">◈</span>
    <span class="nav-label">Beranda</span>
  </button>
  <button class="nav-btn" id="nav-add" onclick="showPage('add')">
    <span class="nav-icon">＋</span>
    <span class="nav-label">Catat</span>
  </button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history')">
    <span class="nav-icon">≡</span>
    <span class="nav-label">Riwayat</span>
  </button>
</nav>

<!-- TOPUP MODAL -->
<div class="modal-overlay" id="topupModal">
  <div class="modal">
    <button class="modal-close" onclick="closeTopup()">✕</button>
    <div class="modal-title">Isi Tabungan</div>
    <div class="form-group">
      <label>Tabungan</label>
      <input type="text" id="topupSavingName" readonly style="color:var(--gold)">
    </div>
    <div class="form-group">
      <label>Jumlah (Rp)</label>
      <input type="number" id="topupAmount" placeholder="100000" inputmode="numeric">
    </div>
    <button class="btn-primary" onclick="doTopup()" style="margin-top:4px">Isi Sekarang</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── STATE ───
  let transactions = JSON.parse(localStorage.getItem('dompet_tx') || '[]');
  let savings = JSON.parse(localStorage.getItem('dompet_savings') || '[]');
  let currentType = 'income';
  let currentFilter = 'all';
  let topupIdx = null;

  // ─── INIT ───
  function init() {
    const now = new Date();
    document.getElementById('dateDisplay').innerHTML =
      now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).replace(/,/,'<br>');
    document.getElementById('txDate').value = now.toISOString().split('T')[0];
    render();
  }

  // ─── UTILS ───
  function fmt(n) {
    return 'Rp ' + Math.abs(n).toLocaleString('id-ID');
  }

  function fmtShort(n) {
    if (n >= 1e9) return (n/1e9).toFixed(1) + 'M';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'jt';
    if (n >= 1e3) return (n/1e3).toFixed(0) + 'rb';
    return n.toString();
  }

  function save() {
    localStorage.setItem('dompet_tx', JSON.stringify(transactions));
    localStorage.setItem('dompet_savings', JSON.stringify(savings));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function catEmoji(cat, type) {
    const map = {
      'Makan & Minum':'🍜','Transport':'🚗','Belanja':'🛍','Tagihan':'💡',
      'Hiburan':'🎮','Kesehatan':'💊','Pendidikan':'📚','Gaji':'💼',
      'Bisnis':'📊','Hadiah':'🎁','Umum':'📝'
    };
    if (type === 'income' && !map[cat]) return '💰';
    return map[cat] || '📝';
  }

  // ─── PAGES ───
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    if (name === 'history') renderHistory();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── TYPE TOGGLE ───
  function setType(type) {
    currentType = type;
    const bi = document.getElementById('btnIncome');
    const be = document.getElementById('btnExpense');
    bi.className = 'type-btn' + (type === 'income' ? ' active-income' : '');
    be.className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
    // update category options
    const cat = document.getElementById('txCategory');
    if (type === 'income') {
      cat.value = cat.options[0] ? cat.options[0].value : 'Umum';
    }
  }

  // ─── ADD TX ───
  function addTransaction() {
    const amount = parseFloat(document.getElementById('txAmount').value);
    const note = document.getElementById('txNote').value.trim();
    const cat = document.getElementById('txCategory').value;
    const date = document.getElementById('txDate').value;

    if (!amount || amount <= 0) { showToast('⚠ Masukkan nominal yang valid'); return; }
    if (!note) { showToast('⚠ Keterangan tidak boleh kosong'); return; }
    if (!date) { showToast('⚠ Tanggal harus diisi'); return; }

    transactions.unshift({ id: Date.now(), type: currentType, amount, note, cat, date });
    save();
    render();
    showToast(currentType === 'income' ? '✓ Pemasukan dicatat' : '✓ Pengeluaran dicatat');

    // reset
    document.getElementById('txAmount').value = '';
    document.getElementById('txNote').value = '';
    showPage('home');
  }

  function deleteTx(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
    renderHistory();
    showToast('Transaksi dihapus');
  }

  // ─── SAVINGS ───
  function addSaving() {
    const name = document.getElementById('savingName').value.trim();
    const target = parseFloat(document.getElementById('savingTarget').value);
    if (!name) { showToast('⚠ Nama tabungan kosong'); return; }
    if (!target || target <= 0) { showToast('⚠ Target tidak valid'); return; }
    savings.push({ id: Date.now(), name, target, current: 0 });
    save();
    document.getElementById('savingName').value = '';
    document.getElementById('savingTarget').value = '';
    renderSavings();
    showToast('🏦 Tabungan dibuat!');
  }

  function deleteSaving(idx) {
    savings.splice(idx, 1);
    save();
    renderSavings();
    showToast('Tabungan dihapus');
  }

  function openTopup(idx) {
    topupIdx = idx;
    document.getElementById('topupSavingName').value = savings[idx].name;
    document.getElementById('topupAmount').value = '';
    document.getElementById('topupModal').classList.add('show');
  }

  function closeTopup() {
    document.getElementById('topupModal').classList.remove('show');
    topupIdx = null;
  }

  function doTopup() {
    const amt = parseFloat(document.getElementById('topupAmount').value);
    if (!amt || amt <= 0) { showToast('⚠ Jumlah tidak valid'); return; }
    const bal = calcBalance();
    if (amt > bal) { showToast('⚠ Saldo tidak cukup'); return; }
    savings[topupIdx].current += amt;
    // record as expense
    transactions.unshift({
      id: Date.now(), type: 'expense',
      amount: amt,
      note: 'Tabungan: ' + savings[topupIdx].name,
      cat: 'Umum',
      date: new Date().toISOString().split('T')[0]
    });
    save();
    render();
    closeTopup();
    showToast('💰 Tabungan diisi!');
  }

  // ─── FILTER ───
  function filterTx(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderHistory();
  }

  // ─── CALC ───
  function calcBalance() {
    return transactions.reduce((s, t) => t.type === 'income' ? s + t.amount : s - t.amount, 0);
  }

  function calcIncome() {
    return transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  }

  function calcExpense() {
    return transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  }

  // ─── RENDER ───
  function render() {
    const bal = calcBalance();
    const inc = calcIncome();
    const exp = calcExpense();

    document.getElementById('balanceNum').textContent = bal.toLocaleString('id-ID');
    document.getElementById('totalIncome').textContent = fmt(inc);
    document.getElementById('totalExpense').textContent = fmt(exp);
    document.getElementById('txCount').textContent = transactions.length;

    renderRecent();
    renderSavings();
    renderChart();
  }

  function txHTML(t, showDelete = true) {
    const d = new Date(t.date).toLocaleDateString('id-ID', {day:'numeric', month:'short'});
    return `<div class="tx-item">
      <div class="tx-dot ${t.type}">${catEmoji(t.cat, t.type)}</div>
      <div class="tx-info">
        <div class="tx-name">${t.note}</div>
        <div class="tx-meta"><span class="tx-cat">${t.cat}</span><span>${d}</span></div>
      </div>
      <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
      ${showDelete ? `<button class="tx-delete" onclick="deleteTx(${t.id})">✕</button>` : ''}
    </div>`;
  }

  function renderRecent() {
    const el = document.getElementById('recentList');
    const recent = transactions.slice(0, 5);
    el.innerHTML = recent.length
      ? recent.map(t => txHTML(t)).join('')
      : `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Belum ada transaksi.<br>Tap <b>Catat</b> untuk mulai.</div></div>`;
  }

  function renderHistory() {
    const el = document.getElementById('historyList');
    let filtered = transactions;
    if (currentFilter === 'income') filtered = filtered.filter(t => t.type === 'income');
    else if (currentFilter === 'expense') filtered = filtered.filter(t => t.type === 'expense');
    else if (currentFilter !== 'all') filtered = filtered.filter(t => t.cat === currentFilter);
    document.getElementById('historyCount').textContent = filtered.length;
    el.innerHTML = filtered.length
      ? filtered.map(t => txHTML(t)).join('')
      : `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Tidak ada transaksi di kategori ini.</div></div>`;
  }

  function renderSavings() {
    const el = document.getElementById('savingsList');
    const total = savings.reduce((s, sv) => s + sv.current, 0);
    document.getElementById('savingsTotal').textContent = fmt(total);
    if (!savings.length) {
      el.innerHTML = `<div class="empty-state" style="padding: 20px 0"><div class="empty-icon">🫙</div><div class="empty-text" style="font-size:12px">Belum ada tabungan</div></div>`;
      return;
    }
    el.innerHTML = savings.map((sv, i) => {
      const pct = sv.target > 0 ? Math.min(100, (sv.current / sv.target) * 100) : 0;
      return `<div class="saving-item">
        <div class="saving-item-top">
          <div class="saving-name">${sv.name}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <button class="saving-topup-btn" onclick="openTopup(${i})">+ Isi</button>
            <button class="saving-delete" onclick="deleteSaving(${i})">✕</button>
          </div>
        </div>
        <div class="saving-amounts">
          <div class="saving-current">${fmt(sv.current)}</div>
          <div class="saving-target">/ ${fmt(sv.target)}</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="saving-pct">${pct.toFixed(0)}% tercapai</div>
      </div>`;
    }).join('');
  }

  function renderChart() {
    const el = document.getElementById('weekChart');
    const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    const today = new Date();
    const data = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      const inc = transactions.filter(t => t.date === ds && t.type === 'income').reduce((s,t)=>s+t.amount,0);
      const exp = transactions.filter(t => t.date === ds && t.type === 'expense').reduce((s,t)=>s+t.amount,0);
      data.push({ day: days[d.getDay()], inc, exp });
    }
    const maxVal = Math.max(...data.map(d => Math.max(d.inc, d.exp)), 1);
    el.innerHTML = data.map(d => `
      <div class="chart-bar-wrap">
        <div class="chart-bar income" style="height:${(d.inc/maxVal)*64}px" title="${fmt(d.inc)}"></div>
        <div class="chart-bar expense" style="height:${(d.exp/maxVal)*64}px" title="${fmt(d.exp)}"></div>
        <div class="chart-label">${d.day}</div>
      </div>
    `).join('');
  }

  // ─── CLOSE MODAL ON BG TAP ───
  document.getElementById('topupModal').addEventListener('click', function(e) {
    if (e.target === this) closeTopup();
  });

  init();
</script>
</body>
</html>
